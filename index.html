<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MealPro | Home</title>
    <link rel="icon" href="images/favicon_io/favicon.ico" type="image/png">
    <link rel="stylesheet" href="styles/styles.css">
    <script type="module" src="scripts/main.js"></script>
</head>
<body>
    <!-- GLOBAL HEADER (always visible) -->
    <header>
        <div class="logo">
            <a href="index.html"><img class="menu-logo" src="images/generic-logo.png" alt="Brand Logo"></a>
        </div>
        <div class="menu-btn">
            <div class="bar1"></div>
            <div class="bar2"></div>
            <div class="bar3"></div>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="meals.html">Meals</a></li>
                <li><a href="mymeals.html">My Meals</a></li>
            </ul>
        </nav>
    </header>
    <div class="modal hide" id="modal">
    <div class="modal-container">
        <div class="top">
            <h2>Stay Updated!</h2>
            <button class="close-btn" id="closeModal">&times;</button>
        </div>

        <p>Subscribe to our newsletter for meal prep tips, recipes, and exclusive offers.</p>

        <form id="subscribeForm">
            <label for="name">Full Name</label>
            <input id="name" type="text" placeholder="Enter your full name" required>
            <small id="nameError" class="error-message"></small>

            <label for="email">Email</label>
            <input id="email" type="email" placeholder="Enter your email" required>
            <small id="emailError" class="error-message"></small>

            <div class="checkbox-group">
                <input id="isAdult" type="checkbox" required>
                <label for="isAdult">I am 18 or older</label>
            </div>
            <small id="adultError" class="error-message"></small>

            <button type="submit">Subscribe</button>
            <p id="successMessage" class="success-message"></p>
        </form>
    </div>
</div>
    <!-- MAIN CONTENT (changes per page) -->
    <main>
         <div class="loader"></div>
        <section class="recipes-grid" id="main-recipe-grid"></section>
    </main>

    <!-- GLOBAL FOOTER (always visible) -->
    <footer>
        <p>&copy; 2026 MealPro</p>
    </footer>
</body>
</html>
