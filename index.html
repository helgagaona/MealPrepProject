<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MealPro | Home</title>
    <link rel="icon" href="images/favicon_io/favicon.ico" type="image/png">
    <link rel="stylesheet" href="styles/styles.css">
    <script type="module" src="scripts/main.js"></script>
</head>
<body>
    <!-- GLOBAL HEADER (always visible) -->
    <header>
        <div class="logo">
            <a href="index.html"><img class="menu-logo" src="images/generic-logo.png" alt="Brand Logo"></a>
        </div>
        <div class="menu-btn">
            <div class="bar1"></div>
            <div class="bar2"></div>
            <div class="bar3"></div>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="meals.html">Meals</a></li>
                <li><a href="mymeals.html">My Meals</a></li>
            </ul>
        </nav>
    </header>
    <div class="modal hide">
        <div class="modal-container">
            <div class="top"> <h2>Stay Updated!</h2><div class="close-btn" id="closeModal">&times;</div>
            </div>
            <p>Subscribe to our newsletter for meal prep tips, recipes, and exclusive offers.</p>
            <form id="subscribeForm">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your full name" required>
                <label>Birthdate</label>
                <input type="date" max="2008-03-26" required>
                <label>Email</label>
                <input type="email" placeholder="Enter your email" required>
                <button type="submit">Subscribe</button>
            </form>
        </div>
    </div>
    <!-- MAIN CONTENT (changes per page) -->
    <main>
         <div class="loader"></div>
        <section class="recipes-grid" id="main-recipe-grid"></section>
    </main>

    <!-- GLOBAL FOOTER (always visible) -->
    <footer>
        <p>&copy; 2026 MealPro</p>
    </footer>
</body>
</html>
